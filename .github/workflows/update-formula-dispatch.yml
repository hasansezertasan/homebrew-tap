---
name: Update Formula (Dispatch)
# Triggered by package repos after PyPI publish
on:
  repository_dispatch:
    types: [update-formula]
# Expected payload:
# {
#   "formula": "micoo",           # Formula name (required)
#   "version": "0.4.0"            # New version (optional, will check PyPI if not provided)
# }
jobs:
  update:
    timeout-minutes: 20
    name: Update formula (dispatch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Validate payload
        # The dispatch payload is attacker-controllable. Read it ONLY through env
        # (never interpolate ${{ ... }} into the script source, which would let a
        # value like `micoo"; rm -rf / #` execute), and validate against strict
        # patterns before any downstream use. Validated values are persisted to
        # $GITHUB_ENV so later steps consume the sanitized data, not the raw event.
        env:
          RAW_FORMULA: ${{ github.event.client_payload.formula }}
          RAW_VERSION: ${{ github.event.client_payload.version }}
        run: |
          if [ -z "$RAW_FORMULA" ]; then
            echo "::error::'formula' is required in client_payload"; exit 1
          fi
          # Homebrew formula token: lowercase alphanumerics plus . _ + - and @
          # (the last for versioned formulae like python@3.14).
          if ! printf '%s' "$RAW_FORMULA" | grep -qE '^[a-z0-9][a-z0-9._+@-]*$'; then
            echo "::error::invalid formula token (must match ^[a-z0-9][a-z0-9._+@-]*\$)"; exit 1
          fi
          # Version is optional; if present, restrict to safe version characters.
          if [ -n "$RAW_VERSION" ] && ! printf '%s' "$RAW_VERSION" | grep -qE '^[A-Za-z0-9][A-Za-z0-9._+-]*$'; then
            echo "::error::invalid version (must match ^[A-Za-z0-9][A-Za-z0-9._+-]*\$)"; exit 1
          fi
          if [ ! -f "Formula/${RAW_FORMULA}.rb" ]; then
            echo "::error::Formula '${RAW_FORMULA}' not found"; exit 1
          fi
          {
            echo "FORMULA=$RAW_FORMULA"
            echo "VERSION=$RAW_VERSION"
          } >> "$GITHUB_ENV"
          echo "Validated formula: $RAW_FORMULA"
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Check for update
        id: check
        run: |
          tap_name="${{ github.repository_owner }}/$(basename "${{ github.repository }}")"
          ref="${tap_name}/${FORMULA}"

          if [ -n "$VERSION" ]; then
            # Version provided in payload (already validated), use it directly.
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "has_update=true" >> "$GITHUB_OUTPUT"
            echo "Using provided version: $VERSION"
          else
            # Use livecheck to find the latest version
            livecheck_output=$(brew livecheck --json "$ref" 2>/dev/null || echo "[]")
            is_outdated=$(echo "$livecheck_output" | jq -r '.[0].version.outdated // false')

            if [ "$is_outdated" = "true" ]; then
              latest=$(echo "$livecheck_output" | jq -r '.[0].version.latest')
              echo "version=$latest" >> "$GITHUB_OUTPUT"
              echo "has_update=true" >> "$GITHUB_OUTPUT"
              echo "Found update: $latest"
            else
              echo "has_update=false" >> "$GITHUB_OUTPUT"
              echo "Formula is already up to date"
            fi
          fi
      - name: Update formula
        if: steps.check.outputs.has_update == 'true'
        env:
          RESOLVED_VERSION: ${{ steps.check.outputs.version }}
        run: |
          tap_name="${{ github.repository_owner }}/$(basename "${{ github.repository }}")"
          ref="${tap_name}/${FORMULA}"

          echo "Updating $FORMULA to $RESOLVED_VERSION..."

          # Use brew bump-formula-pr to update the formula (without creating PR)
          brew bump-formula-pr \
            --no-audit \
            --no-browse \
            --write-only \
            --version="$RESOLVED_VERSION" \
            "$ref"

          # Update Python resources (may fail for non-Python packages)
          brew update-python-resources "$ref" \
            || echo "Note: update-python-resources failed for $FORMULA (may not be a Python package)"
      - name: Create Pull Request
        if: steps.check.outputs.has_update == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(${{ env.FORMULA }}): update to ${{ steps.check.outputs.version }}"
          title: "chore(${{ env.FORMULA }}): update to ${{ steps.check.outputs.version }}"
          body: |
            Automated update triggered by package release.

            - **Formula**: ${{ env.FORMULA }}
            - **Version**: ${{ steps.check.outputs.version }}

            ---
            *Triggered by repository_dispatch from package repo.*
          branch: auto-update/${{ env.FORMULA }}
          delete-branch: true
