---
name: brew test-bot
on:
  push:
    branches:
      - main
    paths:
      - "Formula/**"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/tests.yml"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  syntax:
    name: tap-syntax
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ubuntu-24.04-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ubuntu-24.04-rubygems-
      - run: brew test-bot --only-cleanup-before
      - run: brew test-bot --only-setup
      - run: brew test-bot --only-tap-syntax
  formulae:
    name: build-bottle (${{ matrix.os }})
    needs: syntax
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.draft == false
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 2G
      CARGO_HOME: ${{ github.workspace }}/.cargo
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install sccache
        run: brew install sccache
      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-
      - name: Cache Homebrew downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          # macOS uses ~/Library/Caches/Homebrew, Linux uses ~/.cache/Homebrew;
          # the cache action ignores paths that do not exist on a given runner.
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
            ~/.cache/Homebrew/downloads
            ~/.cache/Homebrew/api
          key: ${{ matrix.os }}-brew-${{ hashFiles('Formula/*.rb') }}
          restore-keys: ${{ matrix.os }}-brew-
      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ${{ github.workspace }}/.cargo/registry
            ${{ github.workspace }}/.cargo/git
          key: ${{ matrix.os }}-cargo-${{ github.run_id }}
          restore-keys: ${{ matrix.os }}-cargo-
      - name: Cache sccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: ${{ matrix.os }}-sccache-${{ github.run_id }}
          restore-keys: ${{ matrix.os }}-sccache-
      - run: brew test-bot --only-cleanup-before
      - run: brew test-bot --only-setup
      - run: brew test-bot --only-formulae
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Upload bottles as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bottles_${{ matrix.os }}
          path: "*.bottle.*"
